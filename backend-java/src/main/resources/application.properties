spring.application.name=shopwise-backend
server.port=8080

# MongoDB Atlas
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=shopwise

# JWT
app.jwt.secret=${JWT_SECRET:shopwise-super-secret-key-change-in-production-min-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# AI Search Service
app.ai-service.url=${AI_SERVICE_URL:http://localhost:3001}

# CORS
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.shopwise=DEBUG
logging.level.org.springframework.security=INFO
