version: "3.9"

services:
  backend-java:
    build: ./backend-java
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      AI_SERVICE_URL: http://ai-search-service:3001
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      - ai-search-service

  ai-search-service:
    build: ./ai-search-service
    ports:
      - "3001:3001"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 3001

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_AI_SEARCH_URL: http://localhost:3001
